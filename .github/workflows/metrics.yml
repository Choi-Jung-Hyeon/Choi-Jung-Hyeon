name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"       # 매일 00:00 UTC 자동 갱신
  workflow_dispatch:          # 수동 실행 버튼
  push:
    branches:
      - main
      - master

# 카드 원본 폭은 480px이고 README에서 전체 너비(~880px, 약 1.83배)로 표시되므로,
# 폰트를 0.61배로 렌더링해 실질 글씨 크기를 본문과 비슷하게 맞춤 (두 카드 동일)
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 언어 비율 카드
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Choi-Jung-Hyeon
          filename: github-languages.svg
          template: classic
          base: ""
          config_timezone: Asia/Seoul
          extras_css: |
            h2 { font-size: 9.8px !important }
            h3, svg { font-size: 8.5px !important }
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, jupyter-notebook, jupyter notebook, hcl, assembly, makefile
          plugin_languages_details: percentage
          plugin_languages_limit: 8

      # 3D 잔디 캘린더 (카드 전체 너비 차지)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Choi-Jung-Hyeon
          filename: github-metrics.svg
          template: classic
          base: ""
          config_timezone: Asia/Seoul
          extras_css: |
            h2 { font-size: 9.8px !important }
            h3, svg { font-size: 8.5px !important }
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
